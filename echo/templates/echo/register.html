{% extends 'echo/base.html' %}
{% block content %}

<div class="auth-section">
    <div class="auth-card">
        <h2 class="mb-4 text-center">
            Create Account
        </h2>
        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                {{ form.username }}
            </div>
            <div class="mb-3">
                {{ form.email }}
            </div>
            <div class="mb-3">
                {{ form.password1 }}
            </div>
            <div class="mb-4">
                {{ form.password2 }}
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Register
            </button>
        </form>
    </div>
</div>

{% endblock %}
