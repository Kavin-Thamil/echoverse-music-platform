{% extends 'echo/base.html' %}
{% block content %}

<section class="songs-section">
    <div class="container">
        <div class="auth-card text-center mb-5">
            <h1 class="display-6 fw-bold mb-3">
                {{ profile_user.username }}
            </h1>
            <p class="fs-5 mt-3">
                🎵 Songs Uploaded:
                {{ user_songs.count }}
            </p>
        </div>
        <h2 class="section-title mb-4">
            Uploaded Songs
        </h2>
        <div class="row g-4">
            {% for song in user_songs %}
            <div class="col-md-4">
                <a href="{% url 'song_detail' song.id %}"
                   class="text-decoration-none text-white">
                    <div class="music-card">
                        <img
                            src="{{ song.cover_image.url }}"
                            class="img-fluid">
                        <div class="p-3">
                            <h4>{{ song.title }}</h4>
                            <p>{{ song.genre }}</p>
                        </div>
                    </div>
                </a>
            </div>
            {% empty %}
            <div class="col-12 text-center">
                <div class="auth-card">
                    <h4>No songs uploaded yet 🎵</h4>
                    <p class="text-muted">
                        Nothing to see here... yet.
                    </p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

{% endblock %}
